services:
  db:
    image: postgres:16-alpine
    container_name: baskent_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: oys3
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oys3"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./bitirme-backend-main
    container_name: baskent_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=oys3;Username=postgres;Password=1234
      DisableHttpsRedirection: "true"
      APP_BASE_URL: "http://localhost:5283"
      FRONTEND_URL: "http://localhost:3000"
    ports:
      - "5283:8080"
    volumes:
      - api_logs:/app/logs

  web:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: /api
    container_name: baskent_web
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
  api_logs: